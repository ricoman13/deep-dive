name: Build DeepDive Vita VPK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: vitasdk/vitasdk:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

     
      - name: Build VPK
        run: make

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepDiveVita
          path: DeepDiveVita.vpk
          retention-days: 30
